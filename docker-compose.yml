services:
  db:
    image: postgis/postgis:16-3.4
    container_name: toronto_zoning_postgis
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: zoning_db
    ports:
      - "5433:5432"
    volumes:
      - postgis_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d zoning_db"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgis_data:
